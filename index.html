<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>市場情報小幫手</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  /* ===== 設定區：填這兩個就好 ===== */
  /* LIFF_ID 與 API 網址在最下面 <script> 的 CFG，改那裡 */

  :root{
    --red:#e11d2a;      /* 台股慣例：漲=紅 */
    --green:#0a8f52;    /* 跌=綠 */
    --gold:#c9a227;
    --ink:#1c1a17;
    --sub:#6b6459;
    --line:#ece7dd;
    --bg:#f4f1ea;
    --card:#ffffff;
    --brand:#b11116;
    --brand2:#7d0d10;
    --shadow:0 2px 10px rgba(40,20,10,.06);
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    padding-bottom:calc(76px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }

  /* Header */
  header{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(135deg,var(--brand) 0%,var(--brand2) 100%);
    color:#fff; padding:calc(14px + env(safe-area-inset-top)) 16px 14px;
    box-shadow:0 2px 12px rgba(120,10,12,.28);
  }
  .h-row{display:flex; align-items:center; gap:10px}
  .logo{
    width:34px;height:34px;border-radius:10px;flex:0 0 auto;
    background:radial-gradient(circle at 30% 30%,#ffe08a,var(--gold));
    display:flex;align-items:center;justify-content:center;font-size:18px;
    box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.5);
  }
  .h-title{font-size:18px;font-weight:800;letter-spacing:.5px;line-height:1.1}
  .h-sub{font-size:11.5px;opacity:.85;margin-top:2px}
  .h-right{margin-left:auto;text-align:right;font-size:11px;opacity:.9}
  .h-hi{font-weight:700}

  /* Tabs */
  .tabs{
    position:sticky; top:0; z-index:19;
    display:flex; background:var(--card); border-bottom:1px solid var(--line);
    box-shadow:var(--shadow);
  }
  .tab{
    flex:1; text-align:center; padding:12px 4px 10px; font-size:13px; font-weight:700;
    color:var(--sub); cursor:pointer; position:relative; user-select:none;
  }
  .tab .ic{display:block;font-size:18px;margin-bottom:2px}
  .tab.active{color:var(--brand)}
  .tab.active::after{
    content:""; position:absolute; left:50%; transform:translateX(-50%);
    bottom:0; width:32px; height:3px; border-radius:3px 3px 0 0; background:var(--brand);
  }

  main{padding:14px 14px 6px; max-width:560px; margin:0 auto}
  .view{display:none} .view.on{display:block; animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .sec-title{display:flex;align-items:center;gap:8px;margin:2px 2px 10px;font-size:15px;font-weight:800}
  .sec-title .dot{width:8px;height:8px;border-radius:50%;background:var(--gold)}
  .updated{margin-left:auto;font-size:11px;color:var(--sub);font-weight:600}

  .card{
    background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:14px; margin-bottom:12px; border:1px solid rgba(0,0,0,.02);
  }
  .card-h{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px;margin-bottom:10px}
  .card-h .tag{margin-left:auto;font-size:11px;color:var(--sub);font-weight:600}

  /* Quote rows */
  .q{display:flex;align-items:center;padding:9px 2px;border-bottom:1px dashed var(--line)}
  .q:last-child{border-bottom:0}
  .q-name{font-size:14px;font-weight:600}
  .q-right{margin-left:auto;text-align:right}
  .q-price{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
  .q-chg{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
  .up{color:var(--red)} .down{color:var(--green)} .flat{color:var(--sub)}
  .pill{display:inline-block;min-width:64px;text-align:center;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:800;margin-left:8px}
  .pill.up{background:rgba(225,29,42,.10)} .pill.down{background:rgba(10,143,82,.10)} .pill.flat{background:#f0ede6}

  .chart-wrap{position:relative;height:150px;margin-top:6px}

  /* AI interpret */
  .ai{background:linear-gradient(135deg,#fff8ec,#fff);border:1px solid #f0e4c6;border-radius:14px;padding:12px 13px;margin-top:4px}
  .ai-h{display:flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--brand);margin-bottom:6px}
  .ai-b{font-size:13.5px;line-height:1.7;white-space:pre-wrap;color:#2a2620}

  /* News */
  .news-b{font-size:13.5px;line-height:1.75;white-space:pre-wrap}
  .news-b b{color:var(--brand)}
  .titles{margin-top:10px;border-top:1px solid var(--line);padding-top:8px}
  .titles li{font-size:12.5px;color:var(--sub);line-height:1.6;margin-left:-8px}

  /* Market sub tabs */
  .subtabs{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;-ms-overflow-style:none;scrollbar-width:none}
  .subtabs::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:8px 16px;border-radius:22px;background:var(--card);border:1px solid var(--line);
    font-size:13px;font-weight:700;color:var(--sub);box-shadow:var(--shadow);cursor:pointer}
  .chip.active{background:var(--brand);color:#fff;border-color:var(--brand)}

  /* Macro grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .mtile{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:12px;cursor:pointer;border:1px solid rgba(0,0,0,.02)}
  .mtile .mt-name{font-weight:800;font-size:13.5px;margin-bottom:4px}
  .mtile .mt-mean{font-size:11.5px;color:var(--sub);line-height:1.5}
  .mrow{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px dashed var(--line)}
  .mrow:last-child{border-bottom:0}
  .mrow .k{color:var(--sub)} .mrow .v{font-weight:700}

  /* Calendar */
  .cal-item{display:flex;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line)}
  .cal-item:last-child{border-bottom:0}
  .cal-when{flex:0 0 auto;width:74px;font-size:11.5px;font-weight:800;color:var(--brand);line-height:1.4}
  .cal-name{font-size:13.5px;font-weight:700}
  .cal-note{font-size:12px;color:var(--sub);margin-top:2px;line-height:1.5}

  /* Skeleton */
  .sk{background:linear-gradient(90deg,#eee 25%,#f5f5f5 37%,#eee 63%);background-size:400% 100%;
    animation:sh 1.2s infinite;border-radius:8px}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
  .sk-line{height:14px;margin:9px 0}

  /* Share / actions */
  .fab{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    display:flex;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,rgba(244,241,234,0),var(--bg) 40%);
    max-width:560px;margin:0 auto;
  }
  .btn{flex:1;border:0;border-radius:14px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:var(--shadow)}
  .btn-primary{background:var(--brand);color:#fff}
  .btn-ghost{flex:0 0 auto;background:var(--card);color:var(--brand);border:1px solid var(--line)}
  .btn:active{transform:translateY(1px)}

  .err{background:#fff;border:1px solid #f0d0d0;color:#b11116;border-radius:12px;padding:12px;font-size:13px;margin-bottom:12px}
  .foot{text-align:center;font-size:10.5px;color:#a89f90;padding:6px 0 2px}
  .disc{text-align:center;font-size:10px;color:#b3aa9a;margin:2px 0 0}
</style>
</head>
<body>

<header>
  <div class="h-row">
    <div class="logo">📊</div>
    <div>
      <div class="h-title">市場情報小幫手</div>
      <div class="h-sub">掌握市場 · 解讀數據 · 直接跟客戶說</div>
    </div>
    <div class="h-right">
      <div class="h-hi" id="hi">　</div>
      <div id="clock">—</div>
    </div>
  </div>
</header>

<nav class="tabs">
  <div class="tab active" data-tab="morning"><span class="ic">☀️</span>早報</div>
  <div class="tab" data-tab="market"><span class="ic">📈</span>行情</div>
  <div class="tab" data-tab="macro"><span class="ic">🌍</span>總經</div>
  <div class="tab" data-tab="calendar"><span class="ic">🗓</span>行事曆</div>
</nav>

<main>
  <!-- 早報 -->
  <section class="view on" id="v-morning">
    <div class="sec-title"><span class="dot"></span>今日市場早報<span class="updated" id="up-morning"></span></div>
    <div id="morning-dash"></div>
    <div id="morning-news"></div>
  </section>

  <!-- 行情 -->
  <section class="view" id="v-market">
    <div class="sec-title"><span class="dot"></span>行情觀測</div>
    <div class="subtabs" id="mkt-tabs">
      <div class="chip active" data-cat="eq">📈 股市</div>
      <div class="chip" data-cat="fx">💱 外匯</div>
      <div class="chip" data-cat="bond">🏦 債券</div>
      <div class="chip" data-cat="rate">📊 利率</div>
    </div>
    <div id="market-body"></div>
  </section>

  <!-- 總經 -->
  <section class="view" id="v-macro">
    <div class="sec-title"><span class="dot"></span>總經指標　<span style="font-weight:600;font-size:11.5px;color:var(--sub)">點卡片看「偏強/偏弱時市場怎麼動」</span></div>
    <div id="macro-body"></div>
  </section>

  <!-- 行事曆 -->
  <section class="view" id="v-calendar">
    <div class="sec-title"><span class="dot"></span>財經行事曆　<span style="font-weight:600;font-size:11.5px;color:var(--sub)">本月重點</span></div>
    <div id="calendar-body"></div>
  </section>

  <div class="disc">資料僅供參考，非投資建議 · 行情對前一交易日收盤計算</div>
  <div class="foot">市場情報小幫手 · 大綱架構參考財經 M 平方</div>
</main>

<div class="fab">
  <button class="btn btn-primary" id="btn-refresh">🔄 更新此頁</button>
  <button class="btn btn-ghost" id="btn-share">↗ 分享</button>
</div>

<script>
/* =======================================================================
   設定區：改這兩個
   ======================================================================= */
const CFG = {
  LIFF_ID: '2010607621-vFu7HScA',   // ← LINE Developers 建立 LIFF 後拿到的 LIFF ID
  GAS_API_URL: 'https://script.google.com/macros/s/AKfycbxYX-8MeIBhqzUaOvvad9KPr9zsTHdhos-3Eu9qvaiL5x9wa0fdEpSTA028G6T_qkMC/exec'
};
/* ======================================================================= */

const UP = getComputedStyle(document.documentElement).getPropertyValue('--red').trim();
const DOWN = getComputedStyle(document.documentElement).getPropertyValue('--green').trim();
const state = { tab:'morning', cat:'eq', loaded:{}, share:{}, charts:{} };

/* ---------- JSONP ---------- */
function api(params, timeout=35000){
  return new Promise((resolve,reject)=>{
    const cb = 'jp_' + Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    let done=false;
    const cleanup=()=>{ try{delete window[cb];}catch(e){window[cb]=undefined;} s.remove(); };
    const timer=setTimeout(()=>{ if(done)return; done=true; cleanup(); reject(new Error('連線逾時，請稍後再試')); }, timeout);
    window[cb]=(d)=>{ if(done)return; done=true; clearTimeout(timer); cleanup(); resolve(d); };
    const qs=Object.entries(Object.assign({},params,{callback:cb})).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    s.src=CFG.GAS_API_URL+'?'+qs;
    s.onerror=()=>{ if(done)return; done=true; clearTimeout(timer); cleanup(); reject(new Error('連線失敗')); };
    document.body.appendChild(s);
  });
}

/* ---------- helpers ---------- */
const fmt=n=> n>=1000 ? Number(n).toLocaleString('en-US',{maximumFractionDigits:0})
                      : Number(n).toLocaleString('en-US',{maximumFractionDigits:2});
const cls=p=> p==null?'flat':(p>0?'up':(p<0?'down':'flat'));
const arr=p=> p==null?'—':(p>0?'▲':(p<0?'▼':'＝'));
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function skel(n){let h='<div class="card">';for(let i=0;i<n;i++)h+='<div class="sk sk-line" style="width:'+(60+Math.random()*35)+'%"></div>';return h+'</div>';}

function quoteRows(quotes){
  return quotes.map(q=>{
    const c=cls(q.pct);
    const chg=q.pct==null?'—':(arr(q.pct)+' '+(q.pct>0?'+':'')+q.pct.toFixed(2)+'%');
    return `<div class="q"><span class="q-name">${esc(q.name)}</span>
      <span class="q-right"><span class="q-price">${fmt(q.close)}</span>
      <span class="pill ${c}">${chg}</span></span></div>`;
  }).join('');
}
function aiBlock(text){
  return `<div class="ai"><div class="ai-h">✨ AI 解讀</div><div class="ai-b">${esc(text||'—')}</div></div>`;
}
function newsFmt(t){ return esc(t||'').replace(/【([^】]+)】/g,'<b>【$1】</b>'); }

function drawChart(id, quotes){
  const el=document.getElementById(id); if(!el||!window.Chart) return;
  if(state.charts[id]){state.charts[id].destroy();}
  const labels=quotes.map(q=>q.name);
  const vals=quotes.map(q=>q.pct==null?0:q.pct);
  const colors=vals.map(v=>v>0?UP:(v<0?DOWN:'#bbb'));
  state.charts[id]=new Chart(el,{type:'bar',
    data:{labels,datasets:[{data:vals,backgroundColor:colors,borderRadius:6,barPercentage:.72}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>(c.raw>0?'+':'')+c.raw+'%'}}},
      scales:{x:{grid:{color:'#f0ece3'},ticks:{callback:v=>v+'%',font:{size:10}}},
              y:{grid:{display:false},ticks:{font:{size:11}}}}}});
}

/* ---------- renderers ---------- */
async function loadMorning(force){
  if(state.loaded.morning && !force) return;
  state.loaded.morning=true;
  const dash=document.getElementById('morning-dash');
  const news=document.getElementById('morning-news');
  dash.innerHTML=skel(6); news.innerHTML=skel(4);
  // 上半：市場總覽
  api({api:'dashboard'}).then(d=>{
    if(d.error){dash.innerHTML=`<div class="err">行情載入失敗：${esc(d.error)}</div>`;return;}
    document.getElementById('up-morning').textContent='更新 '+d.time;
    dash.innerHTML=`<div class="card"><div class="card-h">📊 市場總覽<span class="tag">對前一交易日收盤</span></div>
      ${quoteRows(d.quotes)}<div class="chart-wrap"><canvas id="ch-dash"></canvas></div>${aiBlock(d.interp)}</div>`;
    drawChart('ch-dash',d.quotes);
    state.share.morning=shareText('☀️ 今日市場早報 '+d.time,d.quotes,d.interp);
  }).catch(e=>dash.innerHTML=`<div class="err">${esc(e.message)}</div>`);
  // 下半：新聞解讀
  api({api:'news'}).then(d=>{
    if(d.error){news.innerHTML=`<div class="err">新聞載入失敗：${esc(d.error)}</div>`;return;}
    const lis=(d.titles||[]).slice(0,6).map(t=>`<li>${esc(t)}</li>`).join('');
    news.innerHTML=`<div class="card"><div class="card-h">📰 財經新聞解讀</div>
      <div class="news-b">${newsFmt(d.interp)}</div>
      ${lis?`<ul class="titles">${lis}</ul>`:''}</div>`;
  }).catch(e=>news.innerHTML=`<div class="err">${esc(e.message)}</div>`);
}

async function loadMarket(force){
  const key='market_'+state.cat;
  const body=document.getElementById('market-body');
  if(state.loaded[key] && !force){ body.innerHTML=state.loaded[key]; if(state._mktQuotes)drawChart('ch-mkt',state._mktQuotes); return; }
  body.innerHTML=skel(6);
  try{
    const d=await api({api:'market',cat:state.cat});
    if(d.error){body.innerHTML=`<div class="err">${esc(d.error)}</div>`;return;}
    const html=`<div class="card"><div class="card-h">${esc(d.title)}<span class="tag">${esc(d.time)} · 對前一交易日收盤</span></div>
      ${quoteRows(d.quotes)}<div class="chart-wrap"><canvas id="ch-mkt"></canvas></div>${aiBlock(d.interp)}</div>`;
    body.innerHTML=html; state.loaded[key]=html; state._mktQuotes=d.quotes;
    drawChart('ch-mkt',d.quotes);
    state.share.market=shareText('📈 '+d.title+' '+d.time,d.quotes,d.interp);
  }catch(e){ body.innerHTML=`<div class="err">${esc(e.message)}</div>`; }
}

async function loadMacro(force){
  const body=document.getElementById('macro-body');
  if(state.loaded.macro && !force){ return; }
  body.innerHTML=skel(6);
  try{
    const list=await api({api:'indicators'});
    if(list.error){body.innerHTML=`<div class="err">${esc(list.error)}</div>`;return;}
    body.innerHTML=`<div class="grid">${list.map((d,i)=>`
      <div class="mtile" data-i="${i}">
        <div class="mt-name">${esc(d.name)}</div>
        <div class="mt-mean">${esc(d.mean)}</div>
      </div>`).join('')}</div><div id="macro-detail"></div>`;
    state._ind=list; state.loaded.macro=true;
    body.querySelectorAll('.mtile').forEach(t=>t.onclick=()=>showIndicator(+t.dataset.i));
  }catch(e){ body.innerHTML=`<div class="err">${esc(e.message)}</div>`; }
}
function showIndicator(i){
  const d=state._ind[i]; if(!d)return;
  const det=document.getElementById('macro-detail');
  det.innerHTML=`<div class="card" style="margin-top:12px">
    <div class="card-h">📈 ${esc(d.name)}<span class="tag">偏強（優於預期）時</span></div>
    <div style="font-size:12.5px;color:var(--sub);margin-bottom:8px">${esc(d.mean)}</div>
    <div class="mrow"><span class="k">股市</span><span class="v">${esc(d.eq)}</span></div>
    <div class="mrow"><span class="k">美債殖利率</span><span class="v">${esc(d.yield)}</span></div>
    <div class="mrow"><span class="k">美元</span><span class="v">${esc(d.usd)}</span></div>
    <div class="mrow"><span class="k">黃金</span><span class="v">${esc(d.gold)}</span></div>
    <div style="font-size:11.5px;color:var(--sub);margin:8px 0 2px">（低於預期時，方向通常相反）</div>
    ${aiBlock('💬 可跟客戶說：\n'+d.say)}</div>`;
  det.scrollIntoView({behavior:'smooth',block:'nearest'});
  state.share.macro='📈 '+d.name+'\n偏強時：股市 '+d.eq+'、殖利率 '+d.yield+'、美元 '+d.usd+'、黃金 '+d.gold+'\n💬 '+d.say;
}

async function loadCalendar(force){
  const body=document.getElementById('calendar-body');
  if(state.loaded.calendar && !force) return;
  body.innerHTML=skel(6);
  try{
    const d=await api({api:'calendar'});
    if(d.error){body.innerHTML=`<div class="err">${esc(d.error)}</div>`;return;}
    let items=(d.items||[]).map(x=>`<div class="cal-item"><div class="cal-when">${esc(x.when)}</div>
      <div><div class="cal-name">${esc(x.name)}</div><div class="cal-note">${esc(x.note)}</div></div></div>`).join('');
    let live='';
    if(d.live && d.live.length){
      live=`<div class="card"><div class="card-h">📅 近 7 日實際公布</div>`+
        d.live.map(x=>`<div class="cal-item"><div class="cal-when">${esc(x.time||'')}</div>
        <div><div class="cal-name">${esc(x.event||'')}</div>
        <div class="cal-note">預期 ${x.estimate==null?'—':esc(String(x.estimate))}　實際 ${x.actual==null?'—':esc(String(x.actual))}</div></div></div>`).join('')+`</div>`;
    }
    body.innerHTML=`<div class="card"><div style="font-size:11.5px;color:var(--sub);margin-bottom:4px">時間為慣例區間，實際以官方公布為準</div>${items}</div>${live}`;
    state.loaded.calendar=true;
    state.share.calendar='🗓 財經行事曆本月重點\n'+(d.items||[]).map(x=>'• ['+x.when+'] '+x.name).join('\n');
  }catch(e){ body.innerHTML=`<div class="err">${esc(e.message)}</div>`; }
}

function shareText(head,quotes,interp){
  const qs=(quotes||[]).map(q=>'• '+q.name+' '+fmt(q.close)+(q.pct==null?'':' '+(q.pct>0?'+':'')+q.pct.toFixed(2)+'%')).join('\n');
  return head+'\n'+qs+(interp?('\n\n📌 '+interp):'')+'\n\n— 市場情報小幫手';
}

/* ---------- tab switch ---------- */
function switchTab(name){
  state.tab=name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('on',v.id==='v-'+name));
  if(name==='morning')loadMorning();
  if(name==='market')loadMarket();
  if(name==='macro')loadMacro();
  if(name==='calendar')loadCalendar();
  window.scrollTo({top:0,behavior:'smooth'});
}
function refreshCurrent(){
  if(state.tab==='morning')loadMorning(true);
  if(state.tab==='market')loadMarket(true);
  if(state.tab==='macro'){state.loaded.macro=false;loadMacro(true);}
  if(state.tab==='calendar'){state.loaded.calendar=false;loadCalendar(true);}
}

/* ---------- share ---------- */
var SHARE_LIFF='https://liff.line.me/2010607621-vFu7HScA';
function shareBundle(){
  var tab=state.tab;
  var url=SHARE_LIFF+'?tab='+tab;
  var summary=(state.share[tab]||'').trim();
  var warn='※ 本內容由市場情報小幫手整理，僅供參考，非投資建議，投資前請自行評估風險。';
  var text='【市場情報小幫手】\n'+(summary?summary+'\n\n':'')+'👉 請點選新版市場情報小幫手：\n'+url+'\n\n'+warn;
  var body=[{type:'text',text:'市場情報小幫手',weight:'bold',size:'lg',color:'#B00020'}];
  if(summary){ body.push({type:'text',text:summary.slice(0,900),wrap:true,size:'sm',color:'#333333',margin:'md'}); }
  body.push({type:'separator',margin:'lg'});
  body.push({type:'text',text:warn,wrap:true,size:'xxs',color:'#999999',margin:'md'});
  var bubble={type:'bubble',
    body:{type:'box',layout:'vertical',contents:body},
    footer:{type:'box',layout:'vertical',contents:[
      {type:'button',style:'primary',color:'#B00020',height:'sm',
       action:{type:'uri',label:'請點選新版市場情報小幫手',uri:url}}
    ]}};
  return {text:text, flex:{type:'flex',altText:'請點選新版市場情報小幫手',contents:bubble}};
}
async function doShare(){
  var b=shareBundle();
  try{
    if(window.liff && liff.isApiAvailable && liff.isApiAvailable('shareTargetPicker')){
      var r=await liff.shareTargetPicker([b.flex]);
      return;
    }
  }catch(e){}
  // 後援（非 LINE 環境）：複製文字版
  try{ await navigator.clipboard.writeText(b.text); alert('已複製分享內容，可直接貼到聊天室'); }
  catch(e){ alert(b.text); }
}

/* ---------- init ---------- */
function tick(){ const d=new Date(); document.getElementById('clock').textContent=
  ('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2)+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }

async function boot(){
  tick(); setInterval(tick,30000);
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchTab(t.dataset.tab));
  document.querySelectorAll('#mkt-tabs .chip').forEach(c=>c.onclick=()=>{
    document.querySelectorAll('#mkt-tabs .chip').forEach(x=>x.classList.toggle('active',x===c));
    state.cat=c.dataset.cat; loadMarket();
  });
  document.getElementById('btn-refresh').onclick=refreshCurrent;
  document.getElementById('btn-share').onclick=doShare;

  // 由網址參數決定初始分頁（給圖文選單深連用）：?tab=morning|market|macro|calendar
  var _initTab=null;
  try{
    var _p=new URLSearchParams(location.search);
    _initTab=_p.get('tab');
    if(!_initTab && _p.get('liff.state')){
      _initTab=new URLSearchParams(String(_p.get('liff.state')).replace(/^\?/,'')).get('tab');
    }
  }catch(e){}
  var _valid=['morning','market','macro','calendar'];
  if(_valid.indexOf(_initTab)>=0){ switchTab(_initTab); } else { loadMorning(); }

  // LIFF：免登入取身分
  try{
    if(CFG.LIFF_ID && CFG.LIFF_ID!=='PASTE_YOUR_LIFF_ID'){
      await liff.init({liffId:CFG.LIFF_ID});
      if(liff.isLoggedIn()){
        const p=await liff.getProfile();
        document.getElementById('hi').textContent=p.displayName?('Hi, '+p.displayName):'';
        // 登記 userId（之後也能收到早報推播）
        api({api:'register',uid:p.userId}).catch(()=>{});
      } else if(!liff.isInClient()){
        // 外部瀏覽器可選擇登入；LINE 內會自動有身分
        // liff.login();  // 需要時再打開
      }
    }
  }catch(e){ /* LIFF 尚未設定或在一般瀏覽器預覽時，功能照常運作 */ }
}
document.addEventListener('DOMContentLoaded',boot);
</script>
</body>
